name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build config.js
        run: node build.js
        env:
          CF_ADMIN_PASSWORD: ${{ secrets.CF_ADMIN_PASSWORD }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy . --project-name anime-portal --branch master --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync ADMIN_PASSWORD to Pages Function secret
        run: printf '%s' "$CF_ADMIN_PASSWORD" | npx wrangler pages secret put ADMIN_PASSWORD --project-name anime-portal
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_ADMIN_PASSWORD: ${{ secrets.CF_ADMIN_PASSWORD }}
        continue-on-error: true
