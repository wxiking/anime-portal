<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  
  <!-- SEO 优化标签 -->
  <title>流光星野 | 个人二次元磨砂玻璃门户</title>
  <meta name="description" content="欢迎来到我的数字幻想空间，这里整合了我的个人技术博客、开源代码库、像素冒险游戏、3D互动艺术画廊。基于唯美的动漫毛玻璃设计与动态樱花雨粒子特效。">
  <meta name="keywords" content="个人主页, 网站集群, 二次元动漫风, 毛玻璃, Glassmorphism, 网页设计, 后台管理, 樱花粒子, Cloudflare Pages">
  <meta name="author" content="星野管理员">

  <!-- 网页图标 -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ffb3c6' stroke-width='2.5'><polygon points='12 2 2 7 12 12 22 7 12 2'/><polyline points='2 17 12 22 22 17'/><polyline points='2 12 12 17 22 12'/></svg>">

  <!-- 核心样式表 -->
  <link rel="stylesheet" href="css/style.css?v=9">
</head>
<body>

  <!-- ==========================================================================
       1. 动漫氛围特效背景 (Twinkling Stars & Sakura Falling)
       ========================================================================== -->
  <div class="bg-anime-container" aria-hidden="true">
    <div class="star-container"></div>
    <div class="sakura-container"></div>
  </div>

  <!-- ==========================================================================
       2. 前台推广门户主体框架 (Portal Screen)
       ========================================================================== -->
  <div class="portal-wrapper">
    
    <!-- 顶部玻璃导航栏 -->
    <header class="nav-container">
      <div class="nav-logo">
        <img id="logo-img" class="logo-icon-img" src="" alt="Logo" style="display:none; width:26px; height:26px; object-fit:contain; border-radius:4px;">
        <svg id="logo-icon-svg" class="logo-icon-svg" xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        <h1 class="logo-title" id="site-name-display">流光星野</h1>
        <span class="admin-badge">主页</span>
      </div>
      
      <nav class="portal-nav-links" aria-label="外部友情链接">
        <a id="nav-github-link" href="https://github.com" target="_blank" class="portal-nav-link" rel="noopener noreferrer">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
          GitHub
        </a>
        <a id="nav-email-link" href="mailto:admin@example.com" class="portal-nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          联系我
        </a>
      </nav>
    </header>

    <!-- 作者二次元毛玻璃个人主页卡 (Author Profile Card) -->
    <section class="author-profile-card" aria-label="作者资料">
      <div class="avatar-container">
        <div class="avatar-frame">
          <!-- 自定义头像（后台设置 URL 后显示） -->
          <img id="avatar-img" class="avatar-img" src="" alt="头像" style="display:none; object-fit:cover;">
          <!-- 默认二次元萌系头像 -->
          <svg id="avatar-svg" class="avatar-img" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="50" fill="#2a1f42"/>
            <path d="M50 25c-15 0-22 8-22 18 0 7 3 13 8 16 0 4-1 10-3 12 5-1 9-5 11-8 2 1 4 1 6 1s4 0 6-1c2 3 6 7 11 8-2-2-3-8-3-12 5-3 8-9 8-16 0-10-7-18-22-18z" fill="#ffb3c6"/>
            <circle cx="42" cy="43" r="3" fill="#fff"/>
            <circle cx="58" cy="43" r="3" fill="#fff"/>
            <path d="M46 52s4 3 8 0" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none"/>
            <path d="M30 38c5-5 12-5 12-5M70 38c-5-5-12-5-12-5" stroke="#ffcad4" stroke-width="2" stroke-linecap="round" fill="none"/>
          </svg>
        </div>
      </div>
      <div class="profile-details">
        <div class="profile-meta">
          <h2 class="author-name" id="author-name-display">星野流光</h2>
          <span class="author-tag" id="author-tag-display">🎨 独立开发者</span>
        </div>
        <p class=”author-motto”>
          <span id=”author-motto-display”>💫 “在星夜与代码的交界处，记录下属于自己的每一朵极光与落樱。”</span>
        </p>
        <div class="social-matrix">
          <a id="social-github-btn" href="https://github.com" target="_blank" rel="noopener noreferrer" class="social-button">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
            GitHub
          </a>
          <a id="social-email-btn" href="mailto:admin@example.com" class="social-button">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            发邮件
          </a>
          <span id="social-wechat-btn" class="social-button" onclick="showWechatInfo()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 6.1H3c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-9c0-1.1-.9-2-2-2z"/><path d="M23 9v6"/><path d="M8 12v.01"/><path d="M12 12v.01"/></svg>
            微信
          </span>
          <span id="social-qq-btn" class="social-button" onclick="showQQInfo()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" x2="9.01" y1="9" y2="9"/><line x1="15" x2="15.01" y1="9" y2="9"/></svg>
            QQ群
          </span>
        </div>
      </div>
    </section>

    <!-- 检索及筛选面板 (Control Panel) -->
    <section class="portal-control-bar" aria-label="搜索筛选面板">
      <div class="filter-tabs-wrapper">
        <div class="portal-filter-tabs" role="tablist" id="portal-filter-tabs">
          <!-- 由 main.js 根据后台分类配置动态渲染 -->
        </div>
      </div>

      <div class="admin-search-wrapper portal-search-wrapper">
        <svg class="admin-search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="portal-search-input" class="admin-search-input" placeholder="搜索网站名称、特色或标签..." aria-label="搜索网站">
      </div>
    </section>

    <!-- 网站列表天空网格 (Spacious Sky Grid) -->
    <main class="portal-grid" id="portal-grid" aria-live="polite">
      <!-- 卡片由 main.js 动态渲染插入 -->
    </main>

    <!-- 搜索为空时显示的占位容器 -->
    <div id="empty-state" class="empty-state" style="border: 1px dashed rgba(255,255,255,0.15); border-radius: 20px; padding: 4rem 2rem; text-align: center; display: none;">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-muted); margin-bottom: 1rem;"><circle cx="12" cy="12" r="10"/><line x1="15" x2="9" y1="9" y2="15"/><line x1="9" x2="15" y1="9" y2="15"/></svg>
      <h3 style="font-size: 1.2rem; color: #fff; margin-bottom: 0.5rem;">没有找到匹配的网站</h3>
      <p style="color: var(--text-secondary); font-size: 0.9rem;">换个关键词，或者切换分类试试~</p>
    </div>

    <!-- 精美前台页脚 -->
    <footer class="portal-footer">
      <div class="footer-info">
        <p class="footer-copy" id="footer-copy-display">© 流光星野. All Rights Reserved.</p>
        <p class="footer-brand">
          <span>由 </span>
          <span class="brand-heart">❤</span>
          <span id="footer-dev-name"> 草丛</span>
          <span id="footer-tagline"> 开发 · 免费托管于 Cloudflare Pages</span>
        </p>
      </div>
      <div class="footer-actions">
        <a href="https://pages.cloudflare.com" target="_blank" rel="noopener noreferrer" class="footer-deploy-badge" aria-label="部署在 Cloudflare">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
          部署于 Cloudflare Pages
        </a>
        <a href="/admin" class="admin-lock-btn" title="进入后台管理">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </a>
      </div>
    </footer>

  </div>



  <!-- ==========================================================================
       5. 前台详情毛玻璃弹窗 (Details Glass Modal Overlay)
       ========================================================================== -->
  <div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-container">
      
      <!-- 弹窗内部渐变发光氛围 -->
      <div id="modal-glow-bg" class="modal-glow-bg"></div>
      
      <!-- 关闭按钮 -->
      <button id="modal-close-btn" class="modal-close-btn" aria-label="关闭详情">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      
      <!-- 弹窗主体内容区 -->
      <div class="modal-content">
        <header class="modal-header">
          <div class="modal-meta">
            <div id="modal-status" class="card-status">
              <!-- 动态注入状态 -->
            </div>
          </div>
          <h2 id="modal-title" class="modal-title">网站详情标题</h2>
        </header>

        <p id="modal-description" class="modal-description">
          这里是动态注入的详细描述内容，支持多段文字的描述。
        </p>

        <div id="modal-features-section">
          <h3 class="modal-section-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 22 12 17 22 22 12 2"/></svg>
            主要功能
          </h3>
          <ul id="modal-features-list" class="features-list">
            <!-- 动态渲染特性 -->
          </ul>
        </div>
      </div>

      <!-- 弹窗底部控制按钮区 -->
      <footer class="modal-footer">
        <button id="modal-btn-secondary" class="btn-action btn-secondary" style="border-radius: 12px; padding: 0.75rem 1.5rem;">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
          复制链接
        </button>
        <a id="modal-btn-primary" href="#" target="_blank" rel="noopener noreferrer" class="btn-action btn-primary" style="border-radius: 12px; padding: 0.75rem 1.5rem;">
          立即访问
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </footer>

    </div>
  </div>

  <!-- 自定义确认弹窗 -->
  <div id="custom-confirm-overlay" class="custom-dialog-overlay" role="dialog" aria-modal="true" aria-labelledby="custom-confirm-title">
    <div class="custom-dialog-card">
      <div class="custom-dialog-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </div>
      <h4 class="custom-dialog-title" id="custom-confirm-title">确认操作</h4>
      <p class="custom-dialog-message" id="custom-confirm-message"></p>
      <div class="custom-dialog-actions">
        <button id="custom-confirm-cancel" class="custom-dialog-btn cancel">取消</button>
        <button id="custom-confirm-ok" class="custom-dialog-btn danger">确定</button>
      </div>
    </div>
  </div>

  <!-- 全局 Toast 通知 -->
  <div id="custom-toast" class="custom-toast" role="status" aria-live="polite">
    <span class="custom-toast-icon" id="custom-toast-icon"></span>
    <span id="custom-toast-message"></span>
  </div>

  <!-- JavaScript 载入 -->
  <script src="js/data.js"></script>
  <script src="js/portal-export.js"></script>
  <script src="js/config.js?v=2"></script>
  <script src="js/main.js"></script>
</body>
</html>
